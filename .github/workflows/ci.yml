name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Default gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.1"
          components: rustfmt, clippy
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Markdown formatter
        run: npm install --global prettier@3.6.2
      - uses: Swatinem/rust-cache@v2
      - name: Run deterministic containerless gate
        run: ./scripts/ci-local.sh

  release-artifact:
    name: x86-64 GNU/Linux release artifact
    needs: check
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Smoke-test extracted artifact
        run: python3 scripts/test-release-artifact.py
      - name: Verify reproducible assembly
        run: python3 scripts/test-release-reproducibility.py
      - name: Assemble downloadable artifact
        if: github.event_name == 'push'
        run: python3 scripts/assemble-release-artifact.py --output-directory dist
      - name: Upload archive and checksum
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: kapsel-x86_64-unknown-linux-gnu-${{ github.sha }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error
          compression-level: 0
