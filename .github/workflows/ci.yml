name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Default gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.1"
          components: rustfmt, clippy
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Markdown formatter
        run: npm install --global prettier@3.6.2
      - uses: Swatinem/rust-cache@v2
      - name: Run deterministic containerless gate
        run: ./scripts/ci-local.sh

  coverage:
    name: Rust coverage (informational)
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.1"
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-llvm-cov@0.8.7
          fallback: none
      - name: Generate deterministic Rust coverage
        run: cargo llvm-cov --locked --workspace --codecov --output-path codecov.json
      - name: Upload informational coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          files: codecov.json
          disable_search: true
          fail_ci_if_error: false
          flags: rust-deterministic
          name: rust-deterministic

  release-artifact:
    name: x86-64 GNU/Linux release artifact
    needs: check
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Smoke-test extracted artifact
        run: python3 scripts/test-release-artifact.py
      - name: Verify reproducible assembly
        run: python3 scripts/test-release-reproducibility.py
      - name: Assemble downloadable artifact
        if: github.event_name == 'push'
        run: python3 scripts/assemble-release-artifact.py --output-directory dist
      - name: Upload archive and checksum
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: kapsel-x86_64-unknown-linux-gnu-${{ github.sha }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error
          compression-level: 0
