# Optional cargo-make aliases. The canonical gate is scripts/ci-local.sh.

[config]
default_to_workspace = false
skip_core_tasks = false

[tasks.check]
description = "Run the deterministic containerless default gate"
command = "./scripts/ci-local.sh"

[tasks.ci]
alias = "check"

[tasks.build]
description = "Build the workspace"
command = "cargo"
args = ["build", "--locked", "--workspace"]

[tasks.test]
description = "Run workspace library and documentation tests"
dependencies = ["test-unit", "test-doc"]

[tasks.test-unit]
description = "Run containerless library tests"
command = "cargo"
args = ["test", "--locked", "--lib", "--bins", "--workspace"]

[tasks.test-doc]
description = "Run documentation tests"
command = "cargo"
args = ["test", "--locked", "--doc", "--workspace"]

[tasks.fmt]
clear = true
description = "Format Rust and Markdown sources"
dependencies = ["fmt-rust", "fmt-markdown"]

[tasks.fmt-rust]
description = "Format Rust sources"
command = "cargo"
args = ["fmt", "--all"]

[tasks.fmt-markdown]
description = "Format Markdown sources and expand tables"
command = "prettier"
args = ["--write", "--no-config", "--ignore-path", ".gitignore", "--print-width", "100", "--prose-wrap", "always", "--tab-width", "2", "**/*.md"]

[tasks.fmt-check]
clear = true
description = "Check Rust and Markdown formatting"
dependencies = ["fmt-check-rust", "fmt-check-markdown"]

[tasks.fmt-check-rust]
description = "Check Rust formatting and line width"
dependencies = ["fmt-check-rustfmt", "fmt-check-rust-width"]

[tasks.fmt-check-rustfmt]
description = "Check Rust formatting"
command = "cargo"
args = ["fmt", "--all", "--check"]

[tasks.fmt-check-rust-width]
description = "Check the strict 100-byte Rust source width"
command = "./scripts/check-rust-width.sh"

[tasks.fmt-check-markdown]
description = "Check Markdown formatting"
command = "prettier"
args = ["--check", "--no-config", "--ignore-path", ".gitignore", "--print-width", "100", "--prose-wrap", "always", "--tab-width", "2", "**/*.md"]

[tasks.tidy]
description = "Run hard project-local hygiene checks"
command = "cargo"
args = ["run", "--quiet", "--locked", "-p", "kapsel-dev", "--bin", "kapsel-tidy", "--", "tidy"]

[tasks.style-audit]
description = "Report non-blocking project-local style prompts"
command = "cargo"
args = ["run", "--quiet", "--locked", "-p", "kapsel-dev", "--bin", "kapsel-tidy", "--", "style-audit"]

[tasks.hooks-install]
description = "Install the repository pre-commit hook"
command = "cargo"
args = ["run", "--quiet", "--locked", "-p", "kapsel-dev", "--bin", "kapsel-hooks", "--", "install"]

[tasks.hooks-uninstall]
description = "Uninstall the repository pre-commit hook"
command = "cargo"
args = ["run", "--quiet", "--locked", "-p", "kapsel-dev", "--bin", "kapsel-hooks", "--", "uninstall"]

[tasks.lint]
description = "Run production-target clippy lints"
command = "cargo"
args = ["clippy", "--locked", "--workspace", "--lib", "--bins", "--all-features", "--", "-D", "warnings"]

[tasks.clean]
description = "Remove build artifacts"
command = "cargo"
args = ["clean"]

[tasks.docs]
description = "Build warning-free workspace documentation"
env = { "RUSTDOCFLAGS" = "-D warnings" }
command = "cargo"
args = ["doc", "--locked", "--workspace", "--no-deps"]

[tasks.docs-links-test]
description = "Test the Markdown path and heading-anchor checker"
command = "./scripts/test-check-markdown-links.py"

[tasks.docs-links]
description = "Check tracked Markdown paths and heading anchors"
dependencies = ["docs-links-test"]
command = "./scripts/check-markdown-links.py"

[tasks.default]
alias = "check"
